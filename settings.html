  pharmacy:['Prescription Medicines','OTC Medicines','Equipment','Injections','Vitamins','Home Delivery'],
  clothing:['Ready-to-Wear','Custom Stitching','Bridal','Kids Wear','Men\'s Wear','Women\'s Wear','Alterations'],
  realestate:['Sale','Rent','Commercial','Site Visit','Valuation','New Projects'],
  bakery:['Fresh Baked','Custom Cakes','Wedding Cakes','Cupcakes','Pastries','Catering'],

  auto:['Engine Service','Oil Change','Tyre Change','AC Repair','Brakes','Denting & Painting','Car Wash'],

}

let _cfg = {}, _currentType = ''

// ── Build UI from saved config ────────────────────────────────────────────
async function load() {
  const { config } = await API.getConfig()
  _cfg = config || {}
  renderForm(_cfg)
  document.getElementById('save-bar').style.display = ''
}

function renderForm(c) {
  const main = document.getElementById('main')
  main.innerHTML = `
    <div class="form-group">
      <label>Business name</label>
      <input type="text" id="f_biz_name" value="${esc(c.business_name||'')}" placeholder="Your business name">
    </div>
    <div class="form-group">
      <label>Reply language</label>
      <select id="f_lang">
        <option value="roman"   ${(c.language||'roman')==='roman'   ?'selected':''}>Roman Urdu / Hinglish</option>
        <option value="english" ${c.language==='english'?'selected':''}>English</option>
        <option value="urdu"    ${c.language==='urdu'   ?'selected':''}>اردو</option>
      </select>
    </div>

    <div class="section-label">Business type</div>
    <div id="type-btns" style="display:flex;flex-wrap:wrap;gap:6px;">
      ${[['gym','🏋️ Gym'],['salon','💇 Salon'],['restaurant','🍔 Restaurant'],['clinic','🏥 Clinic'],
         ['pharmacy','💊 Pharmacy'],['clothing','👗 Clothing'],['realestate','🏠 Real Estate'],
         ['bakery','🎂 Bakery'],['grocery','🛒 Grocery'],['auto','🔧 Auto'],['electronics','📱 Electronics'],
         ['dental','🦷 Dental'],['catering','🍽️ Catering'],['shop','🛍️ Retail'],['academy','📚 Academy'],['general','🏢 Other']]
        .map(([k,l])=>`<button type="button" class="type-btn ${c.business_type===k?'active':''}" onclick="selectType('${k}')">${l}</button>`).join('')}
    </div>

    <div class="section-label">Working hours</div>
    <div class="hours-row">
      <select id="f_open">${timeOptions(c)}</select>
      <span style="color:var(--text2)">to</span>
      <select id="f_close">${closeOptions(c)}</select>
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px" id="day-btns">
      ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>{
        const on = isDayOn(c.working_hours||'', d)
        return `<button type="button" class="day-btn ${on?'on':''}" data-d="${d}" onclick="this.classList.toggle('on')">${d}</button>`
      }).join('')}
    </div>

    <div class="section-label">Services</div>
    <div id="svc-chips" style="margin-bottom:10px"></div>
    <div style="display:flex;gap:8px">
      <input type="text" id="svc-inp" placeholder="Add custom service" style="flex:1">
      <button type="button" class="btn-ghost btn" style="padding:8px 14px;font-size:13px" onclick="addCustomService()">Add</button>
    </div>

    <div class="section-label">Pricing</div>
    <div id="price-rows"></div>
    <button type="button" class="add-btn" onclick="addPriceRow('','')">+ Add price</button>

    <div class="section-label">Menu / Catalog</div>
    <div id="catalog-cards"></div>
    <button type="button" class="add-btn" onclick="addCatalogCard('','','')">+ Add item</button>

    <div class="section-label">FAQs</div>
    <div id="faq-cards"></div>
    <button type="button" class="add-btn" onclick="addFaq('','')">+ Add FAQ</button>

    <div class="section-label">Bot personality</div>
    <select id="persona-preset" onchange="setPersona(this.value)" style="width:100%;background:var(--elevated);border:1px solid var(--border);border-radius:8px;color:var(--text1);padding:10px 12px;font-size:14px;margin-bottom:8px">
      <option value="">-- Choose a style --</option>
      <option value="Ek friendly aur helpful assistant ki tarah jawab do.">Friendly &amp; Professional</option>
      <option value="Ek experienced aur confident expert ki tarah guide karo.">Expert Advisor</option>
      <option value="Hamesha jaldi aur seedha jawab do.">Quick &amp; Direct</option>
      <option value="custom">Custom…</option>
    </select>
    <div id="persona-custom" style="display:none">
      <textarea id="f_persona" rows="3" placeholder="Describe how the bot should talk…" oninput="_cfg._persona=this.value">${esc(c.ai_persona||'')}</textarea>
    </div>

    <div class="section-label">Extra knowledge</div>
    <textarea id="f_kb" rows="4" placeholder="Address, special notes, anything extra the bot should know…">${esc(c.knowledge_base||c.faq||'')}</textarea>

    <div style="height:80px"></div>
  `

  _currentType = c.business_type || ''
  const svcs = Array.isArray(c.services) ? c.services : (c.services||'').split('\n').filter(Boolean)
  const allSvcs = [...new Set([...(TYPE_SERVICES[_currentType]||[]), ...svcs])]
  rebuildChips(allSvcs, svcs)
  rebuildPriceRows(c.pricing||{})
  ;(Array.isArray(c.catalog)?c.catalog:[]).forEach(i=>addCatalogCard(i.name,i.price,i.desc))
  const kb = c.knowledge_base||c.faq||''
  if(kb) { const faqs = kb.split(/Q:/i).filter(Boolean); faqs.forEach(f=>{ const [q,...a]=f.split(/\nA:/i); if(q&&a.length) addFaq(q.trim(), a.join('').trim()) }) }
}

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;') }

function isDayOn(hoursStr, day) {
  if (!hoursStr) return false
  if (hoursStr.includes('Daily')) return true
  if (hoursStr.includes('Mon–Sat') && day !== 'Sun') return true
  return hoursStr.includes(day)
}

function timeOptions(c) {
  const open = (c.working_hours||'').match(/(\d+:\d+ [AP]M)/)?.[1]||'9:00 AM'
  return ['6:00 AM','7:00 AM','8:00 AM','9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM','6:00 PM']
    .map(t=>`<option${t===open?' selected':''}>${t}</option>`).join('')
}
function closeOptions(c) {
  const close = (c.working_hours||'').match(/– (\d+:\d+ [AP]M)/)?.[1]||'9:00 PM'
  return ['5:00 PM','6:00 PM','7:00 PM','8:00 PM','9:00 PM','10:00 PM','11:00 PM','12:00 AM','1:00 AM']
    .map(t=>`<option${t===close?' selected':''}>${t}</option>`).join('')
}

function selectType(type) {
  _currentType = type
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('active', b.textContent.toLowerCase().includes(type.split('')[0])||b.getAttribute('onclick').includes(`'${type}'`)))
  const t = TEMPLATES[type]; if(!t) return
  setHours(t.open, t.close, t.days)
  rebuildChips(TYPE_SERVICES[type]||[], t.services)
  rebuildPriceRows(t.pricing||{})
  document.getElementById('catalog-cards').innerHTML=''
  ;(t.catalog||[]).forEach(i=>addCatalogCard(i.name,i.price,i.desc))
  document.getElementById('faq-cards').innerHTML=''
  ;(t.faqs||[]).forEach(f=>addFaq(f.q,f.a))
  document.getElementById('f_persona').value=t.persona
  _cfg._persona=t.persona
}

function setHours(open, close, days) {
  const os=document.getElementById('f_open'), cs=document.getElementById('f_close')
  Array.from(os.options).forEach(o=>{if(o.value===open)os.value=open})
  Array.from(cs.options).forEach(o=>{if(o.value===close)cs.value=close})
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.toggle('on', days.includes(b.dataset.d)))
}

function getHoursStr() {
  const o=document.getElementById('f_open')?.value, c=document.getElementById('f_close')?.value
  const days=[...document.querySelectorAll('.day-btn.on')].map(b=>b.dataset.d)
  const ds=days.length===7?'Daily':days.join('-')==='Mon-Tue-Wed-Thu-Fri-Sat'?'Mon–Sat':days.join(', ')
  return [o&&c?`${o} – ${c}`:'',ds].filter(Boolean).join(', ')
}

function rebuildChips(all, selected) {
  const box=document.getElementById('svc-chips'); box.innerHTML=''
  all.forEach(s=>addChip(s, selected.includes(s)))
}
function addChip(label, on) {
  const box=document.getElementById('svc-chips')
  const c=document.createElement('span')
  c.className='svc-chip'+(on?' on':''); c.dataset.svc=label
  c.innerHTML=label+' <span class="chip-x" onclick="event.stopPropagation();this.parentElement.remove();rebuildPriceFromChips()">✕</span>'
  c.addEventListener('click',function(e){if(e.target.classList.contains('chip-x'))return;this.classList.toggle('on');rebuildPriceFromChips()})
  box.appendChild(c)
}
function addCustomService() {
  const i=document.getElementById('svc-inp'), v=i.value.trim(); if(!v)return
  addChip(v,true); i.value=''; rebuildPriceFromChips()
}
function getSelectedSvcs() { return[...document.querySelectorAll('.svc-chip.on')].map(c=>c.dataset.svc) }

function rebuildPriceRows(obj) {
  document.getElementById('price-rows').innerHTML=''
  Object.entries(obj).forEach(([k,v])=>addPriceRow(k,v))
}
function rebuildPriceFromChips() {
  const box=document.getElementById('price-rows')
  const existing={}
  box.querySelectorAll('.price-row').forEach(r=>{const l=r.querySelector('.pl')?.value.trim(),a=r.querySelector('.pa')?.value.trim();if(l)existing[l]=a||''})
  box.innerHTML=''
  getSelectedSvcs().forEach(s=>addPriceRow(s,existing[s]||''))
}
function addPriceRow(label, val) {
  const box=document.getElementById('price-rows')
  const r=document.createElement('div'); r.className='price-row'
  r.innerHTML=`<input class="pl" type="text" value="${esc(label)}" placeholder="Service name"><span style="color:var(--text2);font-size:13px">Rs</span><input class="pa" type="text" value="${esc(val)}" placeholder="0" style="max-width:90px"><button type="button" class="del-btn" onclick="this.parentElement.remove()">✕</button>`
  box.appendChild(r)
}
function addCatalogCard(name,price,desc) {
  const box=document.getElementById('catalog-cards')
  const c=document.createElement('div'); c.className='catalog-card'
  c.innerHTML=`<input type="text" class="cn" value="${esc(name)}" placeholder="Item name"><input type="text" class="cp" value="${esc(price)}" placeholder="Price (Rs)"><input type="text" class="cd" value="${esc(desc||'')}" placeholder="Description (optional)"><button type="button" onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px">Remove</button>`
  box.appendChild(c)
}
function addFaq(q,a) {
  const box=document.getElementById('faq-cards')
  const c=document.createElement('div'); c.className='faq-card'
  c.innerHTML=`<input type="text" class="fq" value="${esc(q)}" placeholder="Question"><textarea class="fa" rows="2" placeholder="Answer">${esc(a)}</textarea><button type="button" onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px">Remove</button>`
  box.appendChild(c)
}
function setPersona(val) {
  const show=val==='custom'
  document.getElementById('persona-custom').style.display=show?'':'none'
  if(!show&&val){document.getElementById('f_persona').value=val;_cfg._persona=val}
}

// ── Save ─────────────────────────────────────────────────────────────────
async function saveConfig() {
  const btn=document.getElementById('save-btn')
  btn.disabled=true; btn.textContent='Saving…'

  const services=getSelectedSvcs()
  const pricing={}
  document.querySelectorAll('#price-rows .price-row').forEach(r=>{
    const l=r.querySelector('.pl')?.value.trim(),a=r.querySelector('.pa')?.value.trim()
    if(l&&a) pricing[l]=a
  })
  const catalog=[...document.querySelectorAll('#catalog-cards .catalog-card')].map(c=>({
    name:c.querySelector('.cn')?.value.trim()||'',
    price:c.querySelector('.cp')?.value.trim()||'',
    desc:c.querySelector('.cd')?.value.trim()||'',
  })).filter(i=>i.name)
  const faqs=[...document.querySelectorAll('#faq-cards .faq-card')].map(c=>({
    q:c.querySelector('.fq')?.value.trim()||'',
    a:c.querySelector('.fa')?.value.trim()||'',
  })).filter(f=>f.q&&f.a)

  // FAQs must be folded into knowledge_base, not a separate `faq` key - the
  // server's allowlist only recognizes `knowledge_base` (api_client.py
  // _ALLOWED_KEYS), and bot/ai.js only ever reads `config.knowledge_base ||
  // config.faq`. Saving under a bare `faq` key meant every FAQ card was
  // silently stripped on save with no error - "✅ Saved!" shown regardless.
  const notes = document.getElementById('f_kb')?.value.trim()||''
  const faqText = faqs.length ? faqs.map(f=>`Q: ${f.q}\nA: ${f.a}`).join('\n\n') : ''
  const knowledge_base = [notes, faqText].filter(Boolean).join('\n\n')

  const config={
    business_name: document.getElementById('f_biz_name')?.value.trim()||'',
    business_type: _currentType,
    working_hours: getHoursStr(),
    language: document.getElementById('f_lang')?.value||'roman',
    services,
    pricing,
    catalog,
    knowledge_base,
    ai_persona: document.getElementById('f_persona')?.value||_cfg._persona||'',
  }

  try {
    await API.saveConfig(config)
    toast('✅ Saved! Bot updates within 5 minutes.')
  } catch(e) {
    toast('❌ ' + e.message)
  }
  btn.disabled=false; btn.textContent='Save changes'
}

load().catch(console.error)
</script>
</body>
</html>
