<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f0f0f">
<title>Set Password - CIPHER</title>
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
  :root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2e2e2e;--text1:#f0f0f0;--text2:#a0a0a0;--accent:#a855f7;--red:#ef4444;--green:#30d158;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:380px;}
  .logo{text-align:center;margin-bottom:28px;}
  .logo-mark{font-size:36px;font-weight:800;background:linear-gradient(135deg,#a855f7,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  h2{font-size:20px;font-weight:600;margin-bottom:22px;}
  .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  label{font-size:13px;color:var(--text2);}
  input{background:#242424;border:1px solid var(--border);border-radius:9px;color:var(--text1);padding:12px 14px;font-size:15px;width:100%;outline:none;transition:.15s;}
  input:focus{border-color:var(--accent);}
  .btn{width:100%;padding:13px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:.15s;}
  .btn:hover{filter:brightness(1.1);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;line-height:1.5;}
  .success{background:rgba(48,209,88,.12);border:1px solid rgba(48,209,88,.3);color:var(--green);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;line-height:1.5;}
  .hint{text-align:center;font-size:12px;color:var(--text2);margin-top:18px;}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo"><div class="logo-mark">CIPHER</div></div>
  <h2>Set your password</h2>
  <div class="error" id="err"></div>
  <div class="success" id="ok"></div>
  <div id="form">
    <div class="form-group">
      <label>New password</label>
      <input type="password" id="pass" placeholder="At least 8 characters" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Confirm password</label>
      <input type="password" id="pass2" placeholder="Re-enter password" autocomplete="new-password">
    </div>
    <button class="btn" id="btn" onclick="doSubmit()">Set password</button>
  </div>
</div>
<script src="js/api.js"></script>
<script>
  const params = new URLSearchParams(location.search)
  const token = params.get('token')
  const err = document.getElementById('err')
  const ok  = document.getElementById('ok')

  if (!token) {
    document.getElementById('form').style.display = 'none'
    err.textContent = 'This link is missing a token. Use the link from your email, or request a new one from the login page.'
    err.style.display = ''
  }

  document.getElementById('pass2').addEventListener('keydown', e => { if (e.key === 'Enter') doSubmit() })

  async function doSubmit() {
    const pass  = document.getElementById('pass').value
    const pass2 = document.getElementById('pass2').value
    const btn   = document.getElementById('btn')
    err.style.display = 'none'

    if (pass.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.style.display = ''; return }
    if (pass !== pass2)  { err.textContent = "Passwords don't match."; err.style.display = ''; return }

    btn.disabled = true; btn.textContent = 'Saving...'
    try {
      await API.setPassword(token, pass)
      document.getElementById('form').style.display = 'none'
      ok.textContent = 'Password set. Redirecting to sign in...'
      ok.style.display = ''
      setTimeout(() => location.href = 'login.html', 1500)
    } catch (e) {
      err.textContent = e.message || 'Something went wrong.'
      err.style.display = ''
      btn.disabled = false; btn.textContent = 'Set password'
    }
  }
</script>
</body>
</html>
