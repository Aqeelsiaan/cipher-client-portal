<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f0f0f">
<title>Forgot Password - CIPHER</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2e2e2e;--text1:#f0f0f0;--text2:#a0a0a0;--accent:#a855f7;--red:#ef4444;--green:#30d158;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:380px;}
  .logo{text-align:center;margin-bottom:28px;}
  .logo-mark{font-size:36px;font-weight:800;background:linear-gradient(135deg,#a855f7,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  h2{font-size:20px;font-weight:600;margin-bottom:10px;}
  .sub{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:22px;}
  .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  label{font-size:13px;color:var(--text2);}
  input{background:#242424;border:1px solid var(--border);border-radius:9px;color:var(--text1);padding:12px 14px;font-size:15px;width:100%;outline:none;transition:.15s;}
  input:focus{border-color:var(--accent);}
  .btn{width:100%;padding:13px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:.15s;}
  .btn:hover{filter:brightness(1.1);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .success{background:rgba(48,209,88,.12);border:1px solid rgba(48,209,88,.3);color:var(--green);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;line-height:1.5;}
  .hint{text-align:center;font-size:12px;color:var(--text2);margin-top:18px;}
  .hint a{color:var(--text2);}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-mark">CIPHER</div></div>
  <h2>Reset your password</h2>
  <p class="sub">Enter the email you use to sign in. If it has a CIPHER account, we'll send a reset link.</p>
  <div class="success" id="ok"></div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>
  <button class="btn" id="btn" onclick="doSubmit()">Send reset link</button>
  <p class="hint"><a href="login.html" style="text-decoration:underline;">Back to sign in</a></p>
</div>
<script src="js/api.js"></script>
<script>
  document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') doSubmit() })

  async function doSubmit() {
    const email = document.getElementById('email').value.trim()
    const ok    = document.getElementById('ok')
    const btn   = document.getElementById('btn')
    if (!email) return
    btn.disabled = true; btn.textContent = 'Sending...'
    try {
      const data = await API.forgotPassword(email)
      ok.textContent = data.message || 'If an account exists for that email, a reset link has been sent.'
      ok.style.display = ''
      document.getElementById('email').disabled = true
    } catch (e) {
      // Deliberately generic even on error - never confirm/deny whether the email exists.
      ok.textContent = 'If an account exists for that email, a reset link has been sent.'
      ok.style.display = ''
    }
    btn.textContent = 'Sent'
  }
</script>
</body>
</html>
