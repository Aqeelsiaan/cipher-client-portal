<script src="js/api.js"></script>
<script>
if (!requireAuth()) throw 0

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;') }

async function load() {
  const { notifications } = await API.getNotifications()
  const main = document.getElementById('main')

  if (!notifications.length) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">🔔</div><div class="empty-title">All caught up</div><div class="empty-sub">You'll see alerts here when your bot goes offline, gets a new lead, or your license is expiring.</div></div>`
    return
  }

  // Some notification types (e.g. angry-customer alerts) can embed text a
  // WhatsApp customer typed - must escape before innerHTML, same class of
  // stored-XSS bug as leads.html.
  main.innerHTML = notifications.map(n => {
    const cls = n.type === 'warning' ? 'warning' : n.type === 'error' ? 'error' : ''
    const date = n.created_at ? esc(n.created_at.slice(0, 10)) : ''
    return `
    <div class="card notif-card ${cls}" style="margin-bottom:8px;padding:12px 14px">
      <div class="notif-header">
        <div class="notif-title">${esc(n.title)}</div>
        <div class="notif-date">${date}</div>
      </div>
      ${n.body ? `<div class="notif-body">${esc(n.body)}</div>` : ''}
    </div>`
  }).join('')
}

load().catch(() => {
  document.getElementById('main').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Couldn't load notifications</div><div class="empty-sub">Check your connection and try again.</div></div>`
})
</script>
</body>
