[build]
  publish = "."

# API proxy — the browser calls HTTPS Netlify, Netlify forwards server-side to
# the HTTP VM. Fixes blockable mixed-content (HTTPS page → HTTP API), which
# otherwise kills 100% of API calls including login. Must come BEFORE the SPA
# fallback so /api/* is not swallowed by the catch-all. force=true so it wins
# over any static file. :splat carries the rest of the path + query string.
[[redirects]]
  from = "/api/*"
  to   = "http://136.119.32.195:8001/api/:splat"
  status = 200
  force  = true

# SPA fallback — all unknown paths → index.html
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker — never cache (must always be fresh)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# PWA manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
