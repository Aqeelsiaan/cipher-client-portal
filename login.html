<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f0f0f">
<title>Login - CIPHER</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2e2e2e;--text1:#f0f0f0;--text2:#a0a0a0;--accent:#a855f7;--red:#ef4444;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:380px;}
  .logo{text-align:center;margin-bottom:28px;}
  .logo-mark{font-size:36px;font-weight:800;background:linear-gradient(135deg,#a855f7,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .logo-sub{font-size:13px;color:var(--text2);margin-top:4px;}
  h2{font-size:20px;font-weight:600;margin-bottom:22px;}
  .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  label{font-size:13px;color:var(--text2);}
  input{background:#242424;border:1px solid var(--border);border-radius:9px;color:var(--text1);padding:12px 14px;font-size:15px;width:100%;outline:none;transition:.15s;}
  input:focus{border-color:var(--accent);}
  .btn{width:100%;padding:13px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:.15s;}
  .btn:hover{filter:brightness(1.1);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
  .hint{text-align:center;font-size:12px;color:var(--text2);margin-top:18px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">CIPHER</div>
    <div class="logo-sub">Your business, automated.</div>
  </div>
  <h2>Sign in</h2>
  <div class="error" id="err"></div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="btn" onclick="doLogin()">Sign in</button>
  <p class="hint"><a href="forgot-password.html" style="color:var(--text2);text-decoration:underline;">Forgot password?</a></p>
</div>
<script src="js/api.js"></script>
<script>
  if (API.isLoggedIn()) location.href = '/index.html'

  document.getElementById('pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })

  async function doLogin() {
    const email = document.getElementById('email').value.trim()
    const pass  = document.getElementById('pass').value
    const err   = document.getElementById('err')
    const btn   = document.getElementById('btn')
    err.style.display = 'none'
    if (!email || !pass) { err.textContent = 'Enter email and password.'; err.style.display = ''; return }
    btn.disabled = true; btn.textContent = 'Signing in…'
    try {
      await API.login(email, pass)
      location.href = '/index.html'
    } catch (e) {
      err.textContent = e.message || 'Login failed'
      err.style.display = ''
      btn.disabled = false; btn.textContent = 'Sign in'
    }
  }
</script>
</body>
</html>
